services:
  aottg2-website:
    build:
      context: .
      args:
        VITE_AUTH_API_BASE_URL: ${VITE_AUTH_API_BASE_URL:-/accounts-api}
        SHOW_LOGIN_NAV: ${SHOW_LOGIN_NAV:-true}
    image: aottg2-website:latest
    container_name: aottg2-website
    environment:
      ACCOUNTS_API_UPSTREAM: ${ACCOUNTS_API_UPSTREAM:-https://accounts.aottg2.com}
    ports:
      - "${WEB_PORT:-8080}:80"
    restart: unless-stopped
