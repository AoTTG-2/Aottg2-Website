name: Build GHCR image

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      show_login_nav:
        description: "Show login/account navbar links in the built website"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/aottg-2/aottg2-website

jobs:
  build-image:
    name: Test, build, and push image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine build config
        id: config
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_SHOW_LOGIN_NAV: ${{ inputs.show_login_nav }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            SHOW_LOGIN_NAV="$DISPATCH_SHOW_LOGIN_NAV"
          else
            SHOW_LOGIN_NAV="true"
          fi

          echo "show_login_nav=$SHOW_LOGIN_NAV" >> "$GITHUB_OUTPUT"

          {
            echo 'tags<<EOF'
            echo "${IMAGE_NAME}:${GITHUB_SHA}"
            if [ "$SHOW_LOGIN_NAV" = "false" ]; then
              echo "${IMAGE_NAME}:main-no-login"
            else
              echo "${IMAGE_NAME}:main"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build app
        run: npm run build
        env:
          VITE_AUTH_API_BASE_URL: ""
          SHOW_LOGIN_NAV: ${{ steps.config.outputs.show_login_nav }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VITE_AUTH_API_BASE_URL=
            SHOW_LOGIN_NAV=${{ steps.config.outputs.show_login_nav }}
          tags: ${{ steps.config.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
